[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options par défaut
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --maxfail=5
    --failed-first

# Marqueurs disponibles
markers =
    basic: Basic functionality tests
    config: Configuration tests
    features: Feature tests
    git: Git integration tests
    edge: Edge case tests
    performance: Performance tests
    regression: Regression tests for known issues
    slow: Slow tests (deselect with '-m "not slow"')
    security: Security tests
    custom: Custom feature tests
    integration: Full integration scenarios
    skip: Skip this test
    xfail: Expected to fail

# Coverage settings (if using pytest-cov)
[coverage:run]
source = .
omit = 
    tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
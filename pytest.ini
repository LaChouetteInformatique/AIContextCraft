# pytest.ini - Configuration for AI Context Craft tests

[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts = 
    -v                     # Verbose output
    --tb=short            # Short traceback format
    --strict-markers      # Error on unknown markers
    --disable-warnings    # Hide warnings
    --color=yes          # Colored output
    --maxfail=5          # Stop after 5 failures
    --failed-first       # Run failed tests first

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests
    unit: unit tests
    parametrize: parameterized tests
    
# Coverage settings
[coverage:run]
source = utils
omit = 
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise NotImplementedError
    pass

[coverage:html]
directory = tests/test-results/coverage
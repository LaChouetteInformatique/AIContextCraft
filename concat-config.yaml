# ================================================================= #
# AI Context Craft - Advanced Configuration File                    #
# ----------------------------------------------------------------- #
# This configuration mimics the project's .gitignore file.          #
# It uses 'exclude' mode to filter out the same files and           #
# directories that Git ignores, ensuring that the context           #
# only contains versioned source code.                              #
# ================================================================= #

concat_project_files:
  # Mode: 'exclude' is the most direct way to replicate .gitignore behavior.
  # The script will include everything *except* what matches the patterns below.
  mode: exclude

  exclude:
    # --- Virtual Environments ---
    - "venv/"
    - ".venv/"
    - "env/"
    - ".env/"
    - "*_env/"
    - "env.bak/"
    - "venv.bak/"

    # --- Python Bytecode and Cache Files ---
    - "__pycache__/"
    - "*.pyc"
    - "*.pyo"
    - "*.pyd"
    - "*.so"

    # --- Build and Distribution Folders ---
    # The 'build/' directory is especially important to exclude
    # to prevent the script from including its own previous output.
    - "build/"
    - "dist/"
    - "downloads/"
    - "eggs/"
    - ".eggs/"
    - "lib/"
    - "lib64/"
    - "parts/"
    - "sdist/"
    - "develop-eggs/"
    - "*.egg-info/"

    # --- Files Generated by this Project ---
    # Explicitly ignore log files and generated text files.
    - "*.log"
    - "project_files_*.txt"
    - "project_tree_*.txt"
    - "concat_*.txt"

    # --- Local Configuration and Secret Files ---
    - ".env"
    - ".env.*"

    # --- IDE and Editor Configuration ---
    - ".idea/"
    - ".vscode/"
    - ".project"
    - ".settings/"
    - "*.sublime-workspace"
    - "*.sublime-project"

    # --- Test and Code Coverage Artifacts ---
    - ".pytest_cache/"
    - ".tox/"
    - ".coverage"
    - ".coverage.*"
    - "nosetests.xml"
    - "coverage.xml"
    - "htmlcov/"
    - ".hypothesis/"

    # --- JavaScript Dependencies ---
    - "node_modules/"
    - "npm-debug.log"
    - "yarn-error.log"

    # --- System Files ---
    - ".DS_Store"
    - "Thumbs.db"
    - "desktop.ini"
    - "ehthumbs.db"
    - "*~"
    - "*.swp"

# You can add other sections like 'tree_project_files' here if you need
# a different set of rules for tree generation. For now, the tree will
# correctly use the same rules as the concatenation.
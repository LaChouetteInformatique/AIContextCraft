version: '3.8'

services:
  # Test environment with Python test runner
  test-runner:
    build:
      context: .
      dockerfile: tests/Dockerfile.test
    image: aicc-test-runner:latest
    container_name: aicc-test-runner
    volumes:
      - ./tests:/app/tests
      - ./utils:/app/utils:ro
      - ./main.py:/app/main.py:ro
      - ./config.yaml:/app/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock  # Docker in Docker
    environment:
      - PYTHONPATH=/app
      - TEST_MODE=true
      - DOCKER_HOST=unix:///var/run/docker.sock
    working_dir: /app/tests
    command: python test_runner_simple.py
    networks:
      - test-network

  # AI Context Craft container for testing
  aicc-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: aicontextcraft:test
    container_name: aicc-test
    volumes:
      - ./tests/test-project:/workspace
      - ./tests/test-configs:/configs:ro
    working_dir: /workspace
    command: --help
    networks:
      - test-network

  # Performance monitoring
  test-monitor:
    image: python:3.9-slim
    container_name: aicc-test-monitor
    volumes:
      - ./tests:/app/tests
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    working_dir: /app
    command: |
      bash -c "pip install docker psutil rich && 
               python -c '
      import docker
      import psutil
      import time
      from rich.console import Console
      from rich.table import Table
      from rich.live import Live
      
      console = Console()
      client = docker.from_env()
      
      def get_stats():
          table = Table(title=\"Test Performance Monitor\")
          table.add_column(\"Container\", style=\"cyan\")
          table.add_column(\"CPU %\", style=\"green\")
          table.add_column(\"Memory\", style=\"yellow\")
          table.add_column(\"Status\", style=\"magenta\")
          
          for container in client.containers.list():
              if \"aicc\" in container.name:
                  stats = container.stats(stream=False)
                  cpu_percent = 0
                  mem_usage = 0
                  
                  try:
                      # Calculate CPU percentage
                      cpu_delta = stats[\"cpu_stats\"][\"cpu_usage\"][\"total_usage\"] - \
                                  stats[\"precpu_stats\"][\"cpu_usage\"][\"total_usage\"]
                      system_delta = stats[\"cpu_stats\"][\"system_cpu_usage\"] - \
                                     stats[\"precpu_stats\"][\"system_cpu_usage\"]
                      if system_delta > 0:
                          cpu_percent = (cpu_delta / system_delta) * 100
                      
                      # Calculate memory usage
                      mem_usage = stats[\"memory_stats\"][\"usage\"] / 1024 / 1024  # MB
                  except:
                      pass
                  
                  table.add_row(
                      container.name,
                      f\"{cpu_percent:.1f}%\",
                      f\"{mem_usage:.1f} MB\",
                      container.status
                  )
          
          return table
      
      with Live(get_stats(), refresh_per_second=1) as live:
          while True:
              time.sleep(1)
              live.update(get_stats())
      '"
    networks:
      - test-network
    profiles:
      - monitor

  # Test database for integration tests
  test-db:
    image: postgres:13-alpine
    container_name: aicc-test-db
    environment:
      - POSTGRES_DB=test_db
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_pass
    volumes:
      - test-db-data:/var/lib/postgresql/data
    networks:
      - test-network
    profiles:
      - integration

  # Test result viewer (web interface)
  test-viewer:
    image: nginx:alpine
    container_name: aicc-test-viewer
    volumes:
      - ./tests/test-results:/usr/share/nginx/html:ro
      - ./tests/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    networks:
      - test-network
    profiles:
      - viewer

networks:
  test-network:
    driver: bridge

volumes:
  test-db-data:
    driver: local
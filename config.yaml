concat_project_files:
  mode: include
  include:
  - '**/*.py'
  - '**/*.js'
  - '**/*.jsx'
  - '**/*.ts'
  - '**/*.tsx'
  - '**/*.md'
  - '**/*.yaml'
  - '**/*.yml'
  - '**/*.json'
  - '**/*.sh'
  - '**/*.bash'
  - '**/*.css'
  - '**/*.scss'
  - '**/*.html'
  - Dockerfile
  - Makefile
  exclude:
  - venv/**
  - .venv/**
  - node_modules/**
  - __pycache__/**
  - '*.pyc'
  - build/**
  - dist/**
  - .git/**
  - '*.log'
  - .env*
  - '*.min.js'
  - '*.min.css'
tree_project_files:
  mode: exclude
  exclude:
  - venv/**
  - .venv/**
  - node_modules/**
  - __pycache__/**
  - .git/**
  - '*.pyc'
  - .env
  - '*.log'
  - .pytest_cache/**
custom_tree_files:
  mode: exclude
  exclude:
  - venv/**
  - .venv/**
  - node_modules/**
  - __pycache__/**
  - .git/**
  - .pytest_cache/**
  - build/**
  - dist/**
  - coverage/**
  - '*.pyc'
  - '*.pyo'
  - '*.log'
  - '*.tmp'
  - '*.temp'
  - '*.min.js'
  - '*.min.css'
  - '*.exe'
  - '*.dll'
  - '*.so'
  - '*.dylib'
  - .env
  - .env.*
  - test_*.py
include_extensions:
- .py
- .js
- .jsx
- .ts
- .tsx
- .md
- .yaml
- .yml
- .json
- .sh
- .bash
exclude_dirs:
- venv
- .venv
- node_modules
- __pycache__
- .git
- build
- dist
- .pytest_cache
exclude_files:
- .env
- .env.local
- package-lock.json
- yarn.lock
- .DS_Store
- Thumbs.db
